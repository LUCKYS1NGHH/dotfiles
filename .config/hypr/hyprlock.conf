source = ~/.config/hypr/colors.conf

background {
    monitor =
    path = ~/Pictures/wallpapers/image.jpg
    blur_passes = 1
    blur_size = 3
}


# Profile image
image {
   path = ~/.pfp.png
   position = 0, 5
   halign = center
   valign = center
   size = 100
   border_size = 3
   border_color = $image_border
}

# Clock
label {
    text = cmd[update:1000] echo "$(date +"%I:%M %a %d %B %Y")"
    font_size = 14
    font_family = JetBrainsMono Nerd Font Mono
    font_weight = 150
    position = 0, 180
    halign = center
    valign = center
}

# Uptime
label {
    text = cmd[update:1000] echo "$(uptime -p)"
    font_size = 8
    color = rgba(ffffff75)
    font_family = JetBrainsMono Nerd Font
    font_weight = 400
    position = 0, 35
    halign = center
    valign = bottom
}

# Username
label {
    monitor =
    text =   $USER
    font_size = 10
    font_family = FiraCode Nerd Font
    font_weight = 700
    position = 0, 80
    halign = center
    valign = bottom

    shadow_passes = 4
    shadow_size = 1
    shadow_color = rgba(00000050)
    shadow_boost = 0.80
}

input-field {
    size = 200, 40
    outline_thickness = 1
    dots_size = 0.18
    dots_spacing = 0.31
    dots_center = true
    outer_color = $input_field_out_border
    inner_color = $input_field_in_border
    font_color = $input_field_font
    fade_on_empty = true
    placeholder_text = > Password <
    shadow_passes = 0
    position = 0, -180
    halign = center
    valign = center
}
