source = ~/.config/hypr/colors.conf

background {
    monitor =
    path = ~/Pictures/wallpapers/image.jpg
    blur_passes = 1
    blur_size = 3
}


# Profile image
image {
   path = ~/.pfp.png
   position = 0, 5
   halign = center
   valign = center
   size = 90
   border_size = 3
   border_color = $image_border
}

# Clock hour
label {
    text = cmd[update:1000] echo "$(date +"%H")"
    font_size = 50
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 245
    halign = center
    valign = center
    color = rgba(255, 255, 255, 0.9)
}

# Clock minutes
label {
    text = cmd[update:1000] echo "$(date +"%M")"
    font_size = 50
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 180
    halign = center
    valign = center
    color = rgba(255, 255, 255, 0.9)
}

# Week
label {
    text = cmd[update:1000] echo "$(date +"%A")"
    font_size = 9
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 287
    halign = center
    valign = center
    color = rgba(255, 255, 255, 0.8)
}

# Day, month and year
label {
    text = cmd[update:1000] echo "$(date +"%d %m %Y")"
    font_size = 9
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 135
    halign = center
    valign = center
    color = rgba(255, 255, 255, 0.8)
}


# Username
label {
    monitor =
    text =   $USER
    font_size = 10
    font_family = FiraCode Nerd Font
    font_weight = 700
    position = 0, 75
    halign = center
    valign = bottom

    shadow_passes = 4
    shadow_size = 1
    shadow_color = rgba(00000050)
    shadow_boost = 0.80
}

# Uptime
label {
    text = cmd[update:1000] echo "$(uptime -p)"
    font_size = 8
    color = rgba(ffffff80)
    font_family = JetBrainsMono Nerd Font
    font_weight = 400
    position = 0, 40
    halign = center
    valign = bottom
}

input-field {
    font_family = FiraCode Nerd Font
    size = 180, 40
    outline_thickness = 1
    dots_size = 0.16
    dots_spacing = 0.36
    dots_center = true
    outer_color = $input_field_out_border
    inner_color = $input_field_in_border
    font_color = $input_field_font
    fade_on_empty = true
    placeholder_text = > Password <
    shadow_passes = 0
    position = 0, -180
    halign = center
    valign = center
    fail_text = "Wrong Password!"
    check_color = $input_field_check_color
    rounding = -1
}


# Weather
label {
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/hyprlock-wttr.py)"
    font_size = 8
    color = rgba(255, 255, 255, 0.6)
    font_family = JetBrainsMono Nerd Font Bold
    position = -28, -28
    halign = right
    valign = top
}
