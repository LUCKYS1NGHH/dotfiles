source = ~/.config/hypr/colors.conf

background {
    monitor =
    path = ~/Pictures/wallpapers/image.jpg
    blur_passes = 1
    blur_size = 3
}


# Profile image
image {
   path = ~/.pfp.png
   position = 0, 5
   halign = center
   valign = center
   size = 100
   border_size = 3
   border_color = $image_border
}

# Clock
label {
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    font_size = 35
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 220
    halign = center
    valign = center
}


# Date
label {
    text = cmd[update:1000] echo " $(date +"%a %d, %B %Y")"
    font_size = 9
    font_family = JetBrainsMono Nerd Font Light
    font_weight = 600
    position = 0, 175
    halign = center
    valign = center
}

# Uptime
label {
    text = cmd[update:1000] echo "$(uptime -p)"
    font_size = 8
    color = rgba(ffffff75)
    font_family = JetBrainsMono Nerd Font
    font_weight = 400
    position = 0, 35
    halign = center
    valign = bottom
}

# Username
label {
    monitor =
    text =   $USER
    font_size = 10
    font_family = FiraCode Nerd Font
    font_weight = 700
    position = 0, 80
    halign = center
    valign = bottom

    shadow_passes = 4
    shadow_size = 1
    shadow_color = rgba(00000050)
    shadow_boost = 0.80
}

input-field {
    size = 200, 40
    outline_thickness = 1
    dots_size = 0.18
    dots_spacing = 0.31
    dots_center = true
    outer_color = $input_field_out_border
    inner_color = $input_field_in_border
    font_color = $input_field_font
    fade_on_empty = true
    placeholder_text = > Password <
    shadow_passes = 0
    position = 0, -180
    halign = center
    valign = center
}


# Weather
label {
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/hyprlock-wttr.py)"
    font_size = 8
    color = rgba(255, 255, 255, 0.6)
    font_family = JetBrainsMono Nerd Font Bold
    position = -28, -28
    halign = right
    valign = top
}
